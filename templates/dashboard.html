<!DOCTYPE html>
<html>
<head>
    <title>Smart Farm Digital Twin</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            color: green;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 30px;
        }

        th, td {
            border: 1px solid #cccccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #eeeeee;
        }

        input {
            width: 120px;
            padding: 5px;
        }

        button {
            padding: 5px 10px;
            cursor: pointer;
        }

        .actual {
            background-color: #f8fff8;
        }

        .virtual {
            background-color: #fffdf5;
        }

    </style>
</head>

<body>

    <h1>Smart Farm Digital Twin</h1>

    <h2>Actual Sensor Data (Live)</h2>

    <table id="actualTable" class="actual">
    </table>

    <h2>Virtual Data </h2>

    <table id="virtualTable" class="virtual">
    </table>

<script>

async function loadActual() {

    try {

        const response =
            await fetch("/farm/actual");

        const data =
            await response.json();

        let html =
            "<tr><th>Property</th><th>Value</th></tr>";

        for (const key in data) {

            html += `
            <tr>
                <td>${key}</td>
                <td>${data[key]}</td>
            </tr>
            `;
        }

        document.getElementById(
            "actualTable"
        ).innerHTML = html;

    } catch(error) {

        console.error(error);
    }
}



async function loadVirtual() {

    try {

        const response =
            await fetch("/farm/virtual");

        const data =
            await response.json();

        let html =
            "<tr><th>Property</th><th>Current Value</th><th>New Value</th><th>Action</th></tr>";

        for (const key in data) {

            html += `
            <tr>

                <td>${key}</td>

                <td>${data[key]}</td>

                <td>

                    <input
                        id="input_${key}"
                        value="${data[key]}"
                    >

                </td>

                <td>

                    <button
                        onclick="saveVirtual('${key}')">

                        Save

                    </button>

                </td>

            </tr>
            `;
        }

        document.getElementById(
            "virtualTable"
        ).innerHTML = html;

    } catch(error) {

        console.error(error);
    }
}



async function saveVirtual(property) {

    const value =
        document.getElementById(
            "input_" + property
        ).value;

    try {

        const response =
            await fetch(
                "/farm/virtual",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({

                        property: property,

                        value: isNaN(value)
                            ? value
                            : Number(value)

                    })
                }
            );

        const result =
            await response.json();

        console.log(result);

        loadVirtual();

    } catch(error) {

        console.error(error);
    }
}



loadActual();

loadVirtual();



setInterval(
    loadActual,
    3000
);

</script>

</body>
</html>
