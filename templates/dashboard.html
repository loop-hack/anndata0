<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shri Timli Farm — Digital Twin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --bg:#F5F3EA;
    --surface:#FFFFFF;
    --surface-2:#EBE6D6;
    --ink:#16241B;
    --ink-soft:#5C6457;
    --line:#D9D0B8;
    --actual:#0E8F72;
    --actual-soft:#DEF2EA;
    --virtual:#6C42C9;
    --virtual-soft:#EBE3F9;
    --amber:#D97B17;
    --amber-soft:#FCEFDA;
    --danger:#C23B2C;
    --ok:#2E8B4E;
    --sky:#2D7DD2;
    --sky-soft:#E2EFFC;
    --leaf:#5A9E2F;
    --leaf-soft:#EBF5DF;
    --radius:10px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:14px;
    line-height:1.45;
  }
  h1,h2,h3,.display{
    font-family:'Space Grotesk',sans-serif;
    margin:0;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{
    font-family:'Inter',sans-serif;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink);
    border-radius:8px;
    padding:8px 12px;
    font-size:13px;
    font-weight:500;
    transition:background .15s,border-color .15s,transform .1s;
  }
  button:hover{border-color:var(--ink-soft);}
  button:active{transform:translateY(1px);}
  button.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  button.primary:hover{background:#0e1812;}
  button.ghost{background:transparent;border-color:transparent;color:var(--ink-soft);}
  button.ghost:hover{color:var(--ink);background:var(--surface-2);}
  button.danger-btn{color:var(--danger);}
  button.danger{background:var(--danger);color:#fff;border-color:var(--danger);}
  button.danger:hover{opacity:.85;}
  button:disabled{opacity:.45;cursor:not-allowed;}
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible{
    outline:2px solid var(--amber);outline-offset:2px;
  }
  input,select{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 8px;
    background:var(--surface);
    color:var(--ink);
    width:100%;
  }
  input[type="text"], select{font-family:'Inter',sans-serif;}
  label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;font-weight:600;display:block;margin-bottom:4px;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ---------- layout shell ---------- */
  .app{display:flex;min-height:100vh;}

  /* ===== SIDEBAR ===== */
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:16px 14px;border-bottom:1px solid var(--line);}
  .brand-mark{
    width:30px;height:30px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,var(--leaf),var(--actual) 55%,var(--virtual));
    position:relative;display:flex;align-items:center;justify-content:center;
    font-size:15px;box-shadow:0 2px 6px rgba(14,143,114,.25);
  }
  .brand-text{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;line-height:1.25;}
  .brand-text span{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:500;font-family:'Inter',sans-serif;}

  /* sensor registry */
  .sensor-page{padding:20px 24px;}
  .sensor-page h2{font-size:16px;margin-bottom:4px;}
  .sensor-page .sp-sub{color:var(--ink-soft);font-size:13px;margin-bottom:18px;}
  .sensor-section{margin-bottom:28px;}
  .sensor-section-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;}
  .sensor-table{width:100%;border-collapse:collapse;}
  .sensor-table th{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);padding:6px 10px;text-align:left;border-bottom:1px solid var(--line);}
  .sensor-table td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle;font-size:13px;}
  .sensor-table tr:last-child td{border-bottom:none;}
  .sensor-table tr.is-new{background:var(--amber-soft);}
  .new-pill{display:inline-block;background:var(--amber);color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle;letter-spacing:.04em;}
  .sensor-id{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;color:var(--ink-soft);}
  .inline-rename{display:flex;gap:6px;align-items:center;}
  .inline-rename input{border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:13px;background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;width:140px;}
  .inline-rename input:focus{outline:none;border-color:var(--ink);}
  .sensor-farm-select{border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12px;background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;}
  .ack-btn{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);background:var(--surface);cursor:pointer;color:var(--ink-soft);}
  .ack-btn:hover{background:var(--surface-2);}
  .save-name-btn{font-size:11px;padding:3px 8px;border-radius:5px;border:none;background:var(--ink);color:#fff;cursor:pointer;}
  .save-name-btn:hover{opacity:.85;}

  button.small{font-size:11px;padding:3px 9px;border-radius:5px;}
  .mapping-chip-list{display:flex;flex-wrap:wrap;gap:6px;max-width:280px;}
  .mapping-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--actual-soft);color:var(--actual);
    border-radius:6px;padding:3px 6px 3px 9px;font-size:11.5px;font-weight:500;
  }
  .mapping-chip-remove{
    border:none;background:transparent;color:var(--actual);opacity:.6;cursor:pointer;
    font-size:11px;padding:0 2px;line-height:1;
  }
  .mapping-chip-remove:hover{opacity:1;}
  .sensor-detail-row td{padding:0;border-bottom:1px solid var(--line);}
  .sensor-detail-panel{
    background:var(--surface-2);padding:16px 20px;display:flex;flex-direction:column;gap:18px;
  }
  .sensor-detail-block{display:flex;flex-direction:column;gap:8px;}
  .sensor-detail-label{font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-soft);}
  .add-mapping-row{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
  .add-mapping-row select{border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12.5px;background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;min-width:200px;}
  .channel-pick-group{display:flex;flex-direction:column;gap:4px;}
  .channel-pick-list{display:flex;flex-wrap:wrap;gap:10px;}
  .channel-pick{font-size:12px;display:flex;align-items:center;gap:4px;color:var(--ink-soft);}
  .channel-range-table{display:flex;flex-direction:column;gap:4px;}
  .channel-range-row{
    display:grid;grid-template-columns:120px 90px 90px 50px 70px;gap:10px;align-items:center;
    padding:5px 0;border-bottom:1px solid var(--line);
  }
  .channel-range-row.head{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);border-bottom:1px solid var(--line);}
  .channel-range-row:last-child{border-bottom:none;}
  .channel-range-row input[type="number"]{
    width:100%;border:1px solid var(--line);border-radius:6px;padding:4px 7px;font-size:12.5px;
    background:var(--surface);color:var(--ink);font-family:'IBM Plex Mono',monospace;
  }
  .channel-range-row input[type="number"]:focus{outline:none;border-color:var(--ink);}
  .source-toggle.small{width:30px;height:17px;}
  .source-toggle.small .knob{width:13px;height:13px;}
  .source-toggle.small.on .knob{left:15px;}

  .side-nav{display:flex;flex-direction:column;padding:10px;gap:2px;border-bottom:1px solid var(--line);}
  .side-nav-btn{
    display:flex;align-items:center;gap:9px;width:100%;text-align:left;
    border:1px solid transparent;background:transparent;border-radius:8px;
    padding:9px 10px;font-size:13.5px;font-weight:500;color:var(--ink-soft);
  }
  .side-nav-btn .ic{width:16px;text-align:center;flex-shrink:0;font-size:14px;}
  .side-nav-btn:hover{background:var(--surface-2);color:var(--ink);}
  .side-nav-btn.active{background:var(--ink);color:#fff;}

  .farm-section-label{
    padding:12px 14px 4px;font-size:11px;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:.05em;font-weight:600;
  }
  .farm-list{flex:1;overflow-y:auto;padding:2px 10px 10px;display:flex;flex-direction:column;gap:3px;}
  .farm-item{
    position:relative;border:1px solid transparent;border-radius:8px;
    padding:9px 10px;cursor:pointer;display:flex;flex-direction:column;gap:2px;
  }
  .farm-item:hover{background:var(--surface-2);}
  .farm-item.active{background:var(--actual-soft);border-color:var(--actual);}
  .farm-item-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .farm-item-name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;}
  .farm-item-icon{font-size:13px;flex-shrink:0;}
  .farm-item-meta{font-size:11px;color:var(--ink-soft);}
  .farm-item-actions{display:none;gap:2px;flex-shrink:0;}
  .farm-item:hover .farm-item-actions{display:flex;}
  .farm-item .icon-btn{
    border:none;background:transparent;padding:2px 5px;font-size:12px;border-radius:5px;color:var(--ink-soft);
  }
  .farm-item .icon-btn:hover{background:var(--surface);color:var(--ink);}
  .scenario-pill-mini{
    display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;
    padding:1px 7px;border-radius:20px;margin-top:2px;width:fit-content;
  }
  .scenario-pill-mini .dotsm{width:5px;height:5px;border-radius:50%;}

  .sidebar-footer{padding:10px 14px 14px;border-top:1px solid var(--line);}
  .add-farm-btn{width:100%;justify-content:center;display:flex;align-items:center;gap:6px;}

  /* ===== MAIN ===== */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
  .topbar{
    position:sticky;top:0;z-index:5;background:var(--bg);
    padding:18px 28px 0;border-bottom:1px solid var(--line);
  }
  .topbar-title{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding-bottom:14px;}
  .topbar-title h1{font-size:21px;display:flex;align-items:center;gap:9px;}
  .title-icon{font-size:19px;}
  .topbar-title .sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .topbar-right{display:flex;gap:8px;align-items:center;}

  .tabs{display:flex;gap:4px;}
  .tab-btn{
    background:transparent;border:none;border-radius:0;padding:9px 4px;margin-right:18px;
    font-size:13.5px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;
  }
  .tab-btn:hover{color:var(--ink);}
  .tab-btn.active{color:var(--ink);border-bottom-color:var(--ink);}

  .content{padding:22px 28px 60px;flex:1;}

  /* scenario pill bar on twin view */
  .scenario-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .scenario-pill-btn{
    display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:30px;
    border:1.5px solid var(--line);background:var(--surface);font-weight:600;font-size:13px;color:var(--ink-soft);
  }
  .scenario-pill-btn .dotsm{width:7px;height:7px;border-radius:50%;background:var(--ink-soft);flex-shrink:0;}
  .scenario-pill-btn .pill-icon{font-size:13px;line-height:1;flex-shrink:0;}
  .scenario-pill-btn:hover{border-color:var(--ink-soft);color:var(--ink);}
  .scenario-pill-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .scenario-pill-btn.active .dotsm{background:#fff;}
  .scenario-pill-btn.add-custom{border-style:dashed;}

  .banner{
    display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;
    font-size:13px;font-weight:500;margin-bottom:16px;
  }
  .banner.amber{background:var(--amber-soft);color:#7a4d10;}
  .banner.stale{background:#F4E3E0;color:#7a2a20;}
  .banner-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;}

  /* ===== DASHBOARD: actual/virtual stacked sections ===== */
  .twin-section{margin-bottom:26px;}
  .twin-section-head{
    display:flex;align-items:center;gap:10px;padding-bottom:10px;margin-bottom:14px;
    border-bottom:2px solid var(--line);
  }
  .twin-section-head .dot{width:9px;height:9px;border-radius:50%;}
  .dot.actual{background:var(--actual);}
  .dot.virtual{background:var(--virtual);}
  .twin-section-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;}
  .twin-section-count{
    margin-left:auto;font-size:11.5px;color:var(--ink-soft);background:var(--surface-2);
    padding:2px 9px;border-radius:20px;font-weight:600;
  }

  .twin-cols{display:grid;grid-template-columns:280px 1fr;gap:18px;}
  @media (max-width:880px){ .twin-cols{grid-template-columns:1fr;} }
  .sensor-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 28px;}
  .sensor-grid .sensor-row{grid-column:span 1;}
  @media (max-width:760px){ .sensor-grid{grid-template-columns:1fr;} }

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .panel-head{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--surface-2);}
  .panel-title{font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);}
  .panel-body{padding:14px;}

  /* image upload box (actual side) */
  .img-upload-box{
    aspect-ratio:1/1;border:1.5px dashed var(--line);border-radius:8px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    background:var(--surface-2);overflow:hidden;position:relative;margin-bottom:10px;
  }
  .img-upload-box:hover{border-color:var(--actual);}
  .img-upload-box img{width:100%;height:100%;object-fit:cover;}
  .img-upload-box .plus{font-size:26px;color:var(--ink-soft);font-weight:300;}
  .img-meta{font-size:11.5px;color:var(--ink-soft);display:flex;flex-direction:column;gap:3px;}
  .img-meta b{color:var(--ink);font-weight:600;}

  .sensor-row{padding:16px 0;border-bottom:1px solid var(--surface-2);}
  .sensor-row:last-child{border-bottom:none;}
  .sensor-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:10px;}
  .sensor-name{font-weight:700;font-size:16px;}
  .sensor-meta{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .sensor-value{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:26px;white-space:nowrap;line-height:1;}
  .sensor-value .unit{font-size:13px;color:var(--ink-soft);font-weight:600;margin-left:4px;}
  .override-flag{
    display:inline-block;margin-left:7px;font-size:10px;font-weight:700;text-transform:uppercase;
    background:var(--amber-soft);color:#7a4d10;padding:1px 7px;border-radius:20px;letter-spacing:.03em;
  }
  .stale-tag{color:var(--danger);}

  .rangebar-track{height:10px;background:var(--surface-2);border-radius:6px;position:relative;}
  .rangebar-fill{position:absolute;left:0;top:0;height:100%;border-radius:6px;background:var(--virtual);}
  .rangebar.actual .rangebar-fill{background:var(--actual);}
  .rangebar.overridden .rangebar-fill{background:var(--amber);}
  .rangebar-marker{position:absolute;top:-4px;width:4px;height:18px;background:var(--ink);border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .rangebar-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:6px;font-weight:500;}

  .empty-state{
    padding:36px 20px;text-align:center;color:var(--ink-soft);font-size:13.5px;
    border:1.5px dashed var(--line);border-radius:10px;
  }
  .empty-state .big{font-size:15px;color:var(--ink);font-weight:600;margin-bottom:6px;display:block;}

  /* ===== SETTINGS TAB ===== */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px;}
  @media (max-width:980px){ .settings-grid{grid-template-columns:1fr;} }

  .add-sensor-form{display:flex;flex-direction:column;gap:10px;}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

  .sensor-table-row{
    display:grid;grid-template-columns:1.4fr .8fr 1fr .7fr .7fr auto;gap:8px;align-items:center;
    padding:7px 0;border-bottom:1px solid var(--surface-2);font-size:12.5px;
  }
  .sensor-table-row.head{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;font-weight:600;}
  .mode-badge{
    display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;text-transform:capitalize;
  }
  .mode-badge.actual{background:var(--actual-soft);color:var(--actual);}
  .mode-badge.virtual{background:var(--virtual-soft);color:var(--virtual);}
  .sensor-table-name{display:flex;align-items:center;gap:7px;}

  /* ===== sensor row source toggle ===== */
  .sensor-row-controls{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .source-toggle{
    position:relative;width:40px;height:22px;border-radius:12px;cursor:pointer;border:none;
    background:var(--virtual);transition:background .15s;flex-shrink:0;
  }
  .source-toggle.on{background:var(--actual);}
  .source-toggle .knob{
    position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.3);transition:left .15s;
  }
  .source-toggle.on .knob{left:20px;}
  .source-toggle-label{font-size:10.5px;font-weight:600;color:var(--ink-soft);text-align:center;margin-top:3px;}
  .minmax-editor{
    display:flex;gap:8px;align-items:center;margin-top:8px;padding:8px 10px;background:var(--surface-2);
    border-radius:8px;font-size:12px;
  }
  .minmax-editor label{color:var(--ink-soft);font-weight:600;}
  .minmax-editor input{
    width:64px;border:1px solid var(--line);border-radius:6px;padding:3px 7px;font-size:12px;
    background:var(--surface);color:var(--ink);font-family:'IBM Plex Mono',monospace;
  }
  .minmax-editor input:focus{outline:none;border-color:var(--ink);}
  .off-tag{color:var(--virtual);font-weight:600;font-size:11px;}

  /* ===== SENSOR LIBRARY (settings) ===== */
  .lib-panel{margin-bottom:22px;}
  .lib-groups{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media (max-width:880px){ .lib-groups{grid-template-columns:1fr;} }
  .lib-group-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .lib-group-count{font-size:11px;color:var(--ink-soft);font-weight:600;}
  .lib-chip-list{display:flex;flex-direction:column;gap:7px;}
  .lib-chip{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);
    border-radius:9px;background:var(--surface);transition:border-color .15s,background .15s;
  }
  .lib-chip:hover{border-color:var(--ink-soft);background:var(--surface-2);}
  .lib-chip-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
  .lib-chip-icon.sm{font-size:13px;width:16px;}
  .lib-chip-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;}
  .lib-chip-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lib-chip-meta{font-size:10.5px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
  .lib-add-btn{
    flex-shrink:0;border:1px solid var(--line);background:var(--surface);font-size:11px;font-weight:700;
    padding:4px 10px;border-radius:20px;color:var(--ink);
  }
  .lib-add-btn:hover{background:var(--actual);color:#fff;border-color:var(--actual);}
  .lib-empty{font-size:12px;color:var(--ink-soft);padding:10px 0;}
  .farm-rename-icon{font-size:18px;}

  /* scenario cards in settings */
  .scenario-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px;}

  /* custom scenario name prompt row */

  .farm-rename input:hover, .farm-rename input:focus{background:var(--surface-2);border-radius:6px;}

  /* ===== CREATE FARM OVERLAY ===== */

    position:fixed;inset:0;background:rgba(28,43,31,.45);z-index:50;

</style>

</div>

<div id="overlayRoot"></div>

<script>
/* =========================================================================
   STATE
   Backend contract (assumed, extend on the FastAPI side):
     Farm 1 is "legacy" and keeps using your existing endpoints:
       GET  /farm/actual          GET  /farm/virtual         POST /farm/virtual
     Any new farm created here uses farm-scoped endpoints:
       GET  /farm/{farmId}/actual GET /farm/{farmId}/virtual POST /farm/{farmId}/virtual
     If a request fails (route not built yet), the UI keeps working off
     in-memory simulated values so you can demo the flow before the
     backend routes exist.
   ========================================================================= */

const BASE_SCENARIOS = ['Flood','Drought','Heat Stroke','Excessive Cold'];
const SCENARIO_COLORS = {
  'Flood':'#2E6F9E', 'Drought':'#C97A1B', 'Heat Stroke':'#B23A2E', 'Excessive Cold':'#2E91A8'
};
const CUSTOM_PALETTE = ['#6B4FA0','#3E7C4A','#A84B8F','#1F8A7A','#8A5A2E'];

let state = {
  farms: [],
  activeFarmId: null,
  activeTab: 'dashboard',
  openScenario: null,
  overlay: null,        // 'create' | null
  createDraft: null,
};

function uid(p){ return p+'_'+Math.random().toString(36).slice(2,9); }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function round(n,d){ const f=Math.pow(10,d); return Math.round(n*f)/f; }
function fmt(n,d=1){ if(n===undefined||n===null||isNaN(n)) return '—'; return round(n,d); }
function randIn(min,max,d){ return round(min + Math.random()*(max-min), d); }
function timeAgo(ts){
  if(!ts) return 'never';
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<5) return 'just now';
  if(s<60) return s+'s ago';
  const m = Math.floor(s/60);
  if(m<60) return m+'m ago';
  return Math.floor(m/60)+'h ago';
}
function scenarioColor(name, farm){
  if(SCENARIO_COLORS[name]) return SCENARIO_COLORS[name];
  const customNames = Object.keys(farm.scenarios).filter(n=>!BASE_SCENARIOS.includes(n));
  const idx = customNames.indexOf(name);
  return CUSTOM_PALETTE[idx % CUSTOM_PALETTE.length] || '#6B4FA0';
}
const SCENARIO_ICONS = { 'Flood':'🌊', 'Drought':'🏜️', 'Heat Stroke':'🥵', 'Excessive Cold':'🥶' };
function scenarioIcon(name){ return SCENARIO_ICONS[name] || '⚠️'; }

/* ---------------- sensor schema (matches real Ditto twin JSON) ---------------- */
/* actual = real hardware probes (soil only). virtual = simulated weather/plant/soil-chem/risk layer. */

function defaultSensors(){
  return [
    // ACTUAL — real soil probe (from Ditto "actual" feature)
    {key:'moisture', name:'Soil Moisture', unit:'%', mode:'actual', min:5, max:60, decimals:1, value:9.6},
    {key:'temperature', name:'Soil Temperature', unit:'°C', mode:'actual', min:10, max:38, decimals:1, value:23},
    {key:'ph', name:'Soil pH', unit:'pH', mode:'actual', min:5.0, max:8.0, decimals:2, value:6.41},
    {key:'ec', name:'Electrical Conductivity', unit:'dS/m', mode:'actual', min:0.2, max:12, decimals:2, value:10},
    {key:'nitrogen', name:'Nitrogen (N)', unit:'mg/kg', mode:'actual', min:0, max:180, decimals:0, value:0},
    {key:'phosphorus', name:'Phosphorus (P)', unit:'mg/kg', mode:'actual', min:0, max:120, decimals:0, value:1},
    {key:'potassium', name:'Potassium (K)', unit:'mg/kg', mode:'actual', min:0, max:150, decimals:0, value:2},

    // VIRTUAL — simulated weather / plant / soil-chemistry / risk layer
    {key:'humidity', name:'Humidity', unit:'%', mode:'virtual', min:20, max:100, decimals:1, value:95},
    {key:'airTemperature', name:'Air Temperature', unit:'°C', mode:'virtual', min:8, max:46, decimals:1, value:28},
    {key:'rainfall', name:'Rainfall', unit:'mm', mode:'virtual', min:0, max:200, decimals:1, value:15},
    {key:'windSpeed', name:'Wind Speed', unit:'km/h', mode:'virtual', min:0, max:60, decimals:1, value:5},
    {key:'solarRadiation', name:'Solar Radiation', unit:'W/m²', mode:'virtual', min:0, max:1100, decimals:0, value:750},
    {key:'sunlightHours', name:'Sunlight (cumulative)', unit:'hrs', mode:'virtual', min:0, max:3000, decimals:0, value:1000},
    {key:'uvIndex', name:'UV Index', unit:'idx', mode:'virtual', min:0, max:12, decimals:1, value:6},
    {key:'co2', name:'CO₂ Concentration', unit:'ppm', mode:'virtual', min:300, max:1200, decimals:0, value:420},
    {key:'plantHeight', name:'Plant Height', unit:'mm', mode:'virtual', min:0, max:2000, decimals:0, value:1043},
    {key:'canopyCoverage', name:'Canopy Coverage', unit:'%', mode:'virtual', min:0, max:100, decimals:1, value:5},
    {key:'rootDepth', name:'Root Depth', unit:'cm', mode:'virtual', min:0, max:60, decimals:1, value:5},
    {key:'irrigationRate', name:'Irrigation Rate', unit:'L/hr', mode:'virtual', min:0, max:100, decimals:1, value:20},
    {key:'irrigationDuration', name:'Irrigation Duration', unit:'min', mode:'virtual', min:0, max:180, decimals:0, value:30},
    {key:'soilOrganicMatter', name:'Soil Organic Matter', unit:'%', mode:'virtual', min:0, max:10, decimals:2, value:3.5},
    {key:'soilSalinity', name:'Soil Salinity', unit:'dS/m', mode:'virtual', min:0, max:4, decimals:2, value:0.3},
    {key:'soilCompaction', name:'Soil Compaction', unit:'%', mode:'virtual', min:0, max:100, decimals:1, value:15},
    {key:'calcium', name:'Calcium', unit:'mg/kg', mode:'virtual', min:0, max:300, decimals:0, value:120},
    {key:'magnesium', name:'Magnesium', unit:'mg/kg', mode:'virtual', min:0, max:150, decimals:0, value:45},
    {key:'sulfur', name:'Sulfur', unit:'mg/kg', mode:'virtual', min:0, max:100, decimals:0, value:30},
    {key:'zinc', name:'Zinc', unit:'mg/kg', mode:'virtual', min:0, max:20, decimals:1, value:3},
    {key:'boron', name:'Boron', unit:'mg/kg', mode:'virtual', min:0, max:5, decimals:2, value:0.5},
    {key:'iron', name:'Iron', unit:'mg/kg', mode:'virtual', min:0, max:30, decimals:1, value:8},
    {key:'copper', name:'Copper', unit:'mg/kg', mode:'virtual', min:0, max:10, decimals:1, value:1},
    {key:'manganese', name:'Manganese', unit:'mg/kg', mode:'virtual', min:0, max:20, decimals:1, value:4},
    {key:'diseaseRisk', name:'Disease Risk', unit:'%', mode:'virtual', min:0, max:100, decimals:0, value:10},
    {key:'pestRisk', name:'Pest Risk', unit:'%', mode:'virtual', min:0, max:100, decimals:0, value:15},
    {key:'ndvi', name:'NDVI (Crop Health)', unit:'idx', mode:'virtual', min:0, max:1, decimals:2, value:0.75},
    {key:'evi', name:'EVI (Enhanced Veg. Index)', unit:'idx', mode:'virtual', min:0, max:1, decimals:2, value:0.62},
    {key:'ndwi', name:'NDWI (Water Index)', unit:'idx', mode:'virtual', min:-1, max:1, decimals:2, value:0.55},
    {key:'floodRisk', name:'Flood Risk', unit:'%', mode:'virtual', min:0, max:100, decimals:0, value:5},
    {key:'droughtRisk', name:'Drought Risk', unit:'%', mode:'virtual', min:0, max:100, decimals:0, value:20},
  ];
}

// non-numeric virtual fields kept on the twin but rendered as text, not range bars
function defaultMeta(){
  return { plantingDate:'2026-06-01', daysSincePlanting:7, growthStage:'Seedling', crop:'Tomato', field:'Field A' };
}

function defaultScenarioOverrides(sensors){
  const find = k => sensors.find(s=>s.key===k);
  const mk = (keys, pairs)=>{
    const o={};
    keys.forEach((k,i)=>{ if(find(k)) o[k]={min:pairs[i][0],max:pairs[i][1]}; });
    return o;
  };
  return {
    'Flood': mk(['rainfall','moisture','humidity','floodRisk','droughtRisk'], [[120,200],[45,60],[85,100],[60,100],[0,5]]),
    'Drought': mk(['rainfall','moisture','humidity','airTemperature','droughtRisk','floodRisk'], [[0,2],[5,12],[10,30],[35,46],[60,100],[0,5]]),
    'Heat Stroke': mk(['airTemperature','humidity','moisture','uvIndex'], [[40,46],[10,25],[5,15],[9,12]]),
    'Excessive Cold': mk(['airTemperature','temperature','humidity'], [[-8,2],[0,6],[40,70]]),
  };
}

function createFarm(name, legacy=false, opts={}){
  // No sensors provided -> a genuinely blank farm, not the old 33-sensor
  // demo default. defaultSensors() must now be requested EXPLICITLY by a
  // caller that actually wants it (nothing currently should) — falling
  // back to it silently is exactly what caused every farm to reappear
  // pre-stocked with the full demo library on every refresh, regardless
  // of what was actually mapped to it via the Sensors tab.
  const sensors = opts.sensors ? JSON.parse(JSON.stringify(opts.sensors)) : [];
  const meta = opts.meta ? {...opts.meta} : defaultMeta();
  const defaults = defaultScenarioOverrides(sensors);
  const scenarios = {};
  BASE_SCENARIOS.forEach(s=>{ scenarios[s] = {overrides: defaults[s] || {}, saved:false}; });
  return {
    id: legacy ? 'legacy' : (opts.id || uid('farm')),
    name, legacy,
    field: meta.field, crop: meta.crop,
    sensors, meta, scenarios,
    activeScenario: null,
    actualStale: false,
    lastActualOk: 0,
    timers: {actual:null, virtual:null},
    image: null, // {dataUrl, ts}
    history: [], // [{ts, scenario, snapshot:{key:value}}]
  };
}

function activeFarm(){ return state.farms.find(f=>f.id===state.activeFarmId); }

/* icon glyphs per sensor key — falls back to a mode-based default */
const SENSOR_ICONS = {
  moisture:'💧', temperature:'🌡️', ph:'⚗️', ec:'⚡', nitrogen:'🧪', phosphorus:'🧪', potassium:'🧪',
  humidity:'💦', airTemperature:'🌤️', rainfall:'🌧️', windSpeed:'🌬️', solarRadiation:'☀️',
  sunlightHours:'🕐', uvIndex:'🔆', co2:'☁️', plantHeight:'🌱', canopyCoverage:'🍃', rootDepth:'🌿',
  irrigationRate:'🚿', irrigationDuration:'⏱️', soilOrganicMatter:'🪴', soilSalinity:'🧂',
  soilCompaction:'🪨', calcium:'🧪', magnesium:'🧪', sulfur:'🧪', zinc:'🧪', boron:'🧪', iron:'🧪',
  copper:'🧪', manganese:'🧪', diseaseRisk:'🦠', pestRisk:'🐛', ndvi:'🛰️', evi:'🛰️', ndwi:'🛰️',
  floodRisk:'🌊', droughtRisk:'🏜️',
};
function sensorIcon(s){ return SENSOR_ICONS[s.key] || (s.mode==='actual' ? '📟' : '🧬'); }

/* Combined sensor library pooled from every farm that currently exists.
   Grows as new sensor types are added on any farm. Excludes sensors the
   target farm already has, and is split into actual / virtual groups. */
function sensorLibrary(targetFarm){
  const seen = new Map(); // key -> sensor definition (first one found)
  state.farms.forEach(f=>{
    f.sensors.forEach(s=>{
      if(!seen.has(s.key)) seen.set(s.key, s);
    });
  });
  const have = new Set(targetFarm.sensors.map(s=>s.key));
  const actual = [];
  const virtual = [];
  seen.forEach((s,key)=>{
    if(have.has(key)) return;
    (s.mode==='actual' ? actual : virtual).push(s);
  });
  actual.sort((a,b)=>a.name.localeCompare(b.name));
  virtual.sort((a,b)=>a.name.localeCompare(b.name));
  return {actual, virtual};
}

function addSensorFromLibrary(key){
  const farm = activeFarm(); if(!farm) return;
  if(farm.sensors.some(s=>s.key===key)) return;
  let src = null;
  for(const f of state.farms){
    const found = f.sensors.find(s=>s.key===key);
    if(found){ src = found; break; }
  }
  if(!src) return;
  farm.sensors.push({...src});
  renderContent();
}

/* ---------------- backend I/O (graceful fallback) ---------------- */

function actualUrl(farm){ return farm.legacy ? '/farm/actual' : `/farm/${farm.id}/actual`; }
function virtualUrl(farm){ return farm.legacy ? '/farm/virtual' : `/farm/${farm.id}/virtual`; }
function scenariosUrl(farm){ return farm.legacy ? '/farm/scenarios' : `/farm/${farm.id}/scenarios`; }

async function persistScenarios(farm){
  try{
    await fetch(scenariosUrl(farm), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(farm.scenarios)
    });
  }catch(e){ console.error('persistScenarios:', e); }
}

async function loadScenarios(farm){
  try{
    const res = await fetch(scenariosUrl(farm));
    if(!res.ok) return;
    const saved = await res.json();
    if(!saved || typeof saved !== 'object') return;
    Object.keys(saved).forEach(name=>{
      farm.scenarios[name] = saved[name];
    });
  }catch(e){ /* no saved scenarios yet — keep local defaults */ }
}

async function tickActual(farm){
  try{
    const res = await fetch(actualUrl(farm));
    if(!res.ok) throw new Error('status '+res.status);
    const data = await res.json();
    farm.sensors.forEach(s=>{
      if(s.mode==='actual' && s.enabledReal!==false && data[s.key]!==undefined && data[s.key]!==null){
        s.value = data[s.key];
      }
    });
    farm.actualStale = false;
    farm.lastActualOk = Date.now();
  }catch(e){
    // backend route missing or offline — keep last known actual values (passthrough)
    farm.actualStale = true;
  }
  // Targeted update only — never a full re-render here. A full renderContent()
  // would rebuild every input on screen every 3 seconds, wiping out anything
  // the user is mid-typing (rename, min/max, mapping checkboxes, etc). Updating
  // just the value text/range-bar for sensors that already have stable DOM ids
  // gets the "live" feel without ever touching anything else on the page.
  if(farm.id===state.activeFarmId && state.activeTab==='dashboard') updateLiveValueDisplays(farm);
}

// Detects whether the user currently has keyboard focus inside an editable
// field anywhere in the main content area. Used to skip auto-triggered
// (polling-driven) re-renders so they never revert an in-progress, unsaved
// edit — the user's own actions (clicking Save, switching tabs, etc.) still
// render normally and are never blocked by this.
function isEditingFocusedInContent(){
  const el = document.activeElement;
  if(!el) return false;
  const content = document.getElementById('content');
  if(!content || !content.contains(el)) return false;
  return el.tagName === 'INPUT' || el.tagName === 'SELECT' || el.tagName === 'TEXTAREA';
}

// Updates only the numbers on screen for one farm's sensor rows — the value
// display and the range-bar fill/marker/labels — without touching any other
// DOM node. This is what tickActual/tickVirtual call every few seconds
// instead of a full renderContent(), so typing into any input anywhere on
// the page is never interrupted by the live polling.
function updateLiveValueDisplays(farm){
  farm.sensors.forEach(s=>{
    const override = activeOverrideFor(farm, s.key);
    const valEl = document.getElementById(`sensorval_${farm.id}_${s.key}`);
    if(valEl){
      const numEl = valEl.querySelector('.value-num');
      if(numEl) numEl.textContent = fmt(s.value, s.decimals);
    }

    const min = override ? override.min : s.min;
    const max = override ? override.max : s.max;
    const pct = clamp(((s.value - min) / ((max - min) || 1)) * 100, 0, 100);

    const fillEl = document.getElementById(`rangebarfill_${farm.id}_${s.key}`);
    if(fillEl) fillEl.style.width = pct + '%';

    const markerEl = document.getElementById(`rangebarmarker_${farm.id}_${s.key}`);
    if(markerEl) markerEl.style.left = pct + '%';
  });
}

function activeOverrideFor(farm, sensorKey){
  if(!farm.activeScenario) return null;
  const cfg = farm.scenarios[farm.activeScenario];
  return cfg && cfg.overrides[sensorKey] ? cfg.overrides[sensorKey] : null;
}

function snapshotFarm(farm){
  const snap = {};
  farm.sensors.forEach(s=>{ snap[s.key]=s.value; });
  return snap;
}

function tickVirtual(farm){
  farm.sensors.forEach(s=>{
    const override = activeOverrideFor(farm, s.key);
    if(override){
      s.value = randIn(override.min, override.max, s.decimals);
    } else if(s.mode==='virtual' || (s.mode==='actual' && s.enabledReal===false)){
      s.value = randIn(s.min, s.max, s.decimals);
    }
    // live actual-mode sensors with no active override keep whatever tickActual gave them
  });
  publishVirtual(farm);
  farm.history.push({ts:Date.now(), scenario:farm.activeScenario, snapshot:snapshotFarm(farm)});
  if(farm.history.length>200) farm.history.shift();
  if(farm.id===state.activeFarmId && state.activeTab==='dashboard') updateLiveValueDisplays(farm);
}

async function publishVirtual(farm){
  const payload = {};
  farm.sensors.forEach(s=>{
    if(s.mode==='virtual' || activeOverrideFor(farm,s.key)) payload[s.key]=s.value;
  });
  try{
    await fetch(virtualUrl(farm), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
  }catch(e){ /* route not built yet — value still tracked locally for the demo */ }
}

function startFarmTimers(farm){
  stopFarmTimers(farm);
  farm.timers.actual = setInterval(()=>tickActual(farm), 3000);
  farm.timers.virtual = setInterval(()=>tickVirtual(farm), 4000);
  tickActual(farm); tickVirtual(farm);
}
function stopFarmTimers(farm){
  if(farm.timers.actual) clearInterval(farm.timers.actual);
  if(farm.timers.virtual) clearInterval(farm.timers.virtual);
}

/* ---------------- farm management ---------------- */

function selectFarm(id){
  state.activeFarmId = id;
  state.openScenario=null;
  try{ localStorage.setItem('smartfarm_active_farm', id); }catch(e){ /* storage unavailable — selection just won't survive a refresh */ }
  renderAll();
}
function setTab(tab){ state.activeTab = tab; state.openScenario=null; if(tab==='sensors') loadSensors(); renderAll(); }

function duplicateFarm(id){
  const src = state.farms.find(f=>f.id===id);
  if(!src) return;
  const farm = createFarm(src.name+' (copy)', false, {sensors:src.sensors, meta:src.meta});
  farm.scenarios = JSON.parse(JSON.stringify(src.scenarios));
  state.farms.push(farm);
  state.activeFarmId = farm.id;
  startFarmTimers(farm);
  renderAll();
}

async function removeFarm(id){
  const farm = state.farms.find(f=>f.id===id);
  if(!farm) return;
  if(!confirm(`Delete "${farm.name}"? This permanently removes it from Ditto — sensor mappings to it will be cleared too. This cannot be undone.`)) return;

  // Call the backend FIRST. Only touch local state once Ditto actually
  // confirms the farm is gone — this is the actual fix for "delete
  // doesn't work / comes back after refresh": the old version only
  // ever removed the farm from local state and never told the backend,
  // so the Ditto thing was still there for the very next page load to
  // fetch right back.
  try{
    const res = await fetch(`/farms/${id}`, { method: 'DELETE' });
    if(!res.ok){
      const detail = await res.text();
      alert(`Could not delete this farm from the server. It has NOT been removed.\n\n${detail}`);
      return;
    }
  }catch(e){
    alert('Could not reach the backend to delete this farm. It has NOT been removed — check your connection and try again.');
    console.error('removeFarm:', e);
    return;
  }

  stopFarmTimers(farm);
  state.farms = state.farms.filter(f=>f.id!==id);
  if(state.activeFarmId===id){
    state.activeFarmId = state.farms[0] ? state.farms[0].id : null;
    try{
      if(state.activeFarmId) localStorage.setItem('smartfarm_active_farm', state.activeFarmId);
      else localStorage.removeItem('smartfarm_active_farm');
    }catch(e){ /* storage unavailable */ }
  }
  renderAll();
}

function renameFarm(id, name){
  const farm = state.farms.find(f=>f.id===id);
  if(!farm || !name.trim()) return;
  farm.name = name.trim();
  renderSidebar();
  document.getElementById('farmTitle').innerHTML = `<span class="title-icon">${cropIcon(farm.crop)}</span>${farm.name}`;
}

/* ---------------- sensor configurator ---------------- */

function addSensorFromForm(){
  const farm = activeFarm(); if(!farm) return;
  const name = document.getElementById('newSensorName').value.trim();
  const unit = document.getElementById('newSensorUnit').value.trim();
  const mode = document.getElementById('newSensorMode').value;
  const min = parseFloat(document.getElementById('newSensorMin').value);
  const max = parseFloat(document.getElementById('newSensorMax').value);
  if(!name || isNaN(min) || isNaN(max) || min>=max){
    alert('Give the sensor a name and a valid min < max range.');
    return;
  }
  const key = name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'') || uid('sensor');
  if(farm.sensors.some(s=>s.key===key)){ alert('A sensor with this name already exists.'); return; }
  farm.sensors.push({key, name, unit, mode, min, max, decimals: (max-min)<5 ? 2 : 1, value: round((min+max)/2,1)});
  renderContent();
}

function removeSensor(key){
  const farm = activeFarm(); if(!farm) return;
  farm.sensors = farm.sensors.filter(s=>s.key!==key);
  Object.keys(farm.scenarios).forEach(s=>{ delete farm.scenarios[s].overrides[key]; });
  renderContent();
}

/* Renamed from updateSensorRange to updateLocalSensorRange — there were
   TWO functions named updateSensorRange in this file (this one, 3-arg,
   for the local demo simulator; another, 4-arg, for the farm-scoped
   Settings table below). JS keeps only the last declaration with a
   given name, so every call to the 3-arg version was silently calling
   the 4-arg one instead with its extra argument as undefined — which is
   exactly why the Settings-tab min/max inputs did nothing. Renaming
   this one removes the collision entirely. */
function updateLocalSensorRange(key, field, value){
  const farm = activeFarm(); if(!farm) return;
  const sensor = farm.sensors.find(s=>s.key===key); if(!sensor) return;
  const v = parseFloat(value);
  if(!isNaN(v)) sensor[field]=v;
}

function toggleSensorMode(key){
  const farm = activeFarm(); if(!farm) return;
  const sensor = farm.sensors.find(s=>s.key===key); if(!sensor) return;
  sensor.mode = sensor.mode==='actual' ? 'virtual' : 'actual';
  renderContent();
}

/* ---------------- scenarios ---------------- */

function openScenario(name){

  renderContent();
}

function updateOverride(scenario, key, field, value){
  const farm = activeFarm(); if(!farm) return;
  const cfg = farm.scenarios[scenario];
  if(!cfg.overrides[key]) cfg.overrides[key] = {min:0,max:0};
  const v = parseFloat(value);
  if(!isNaN(v)) cfg.overrides[key][field]=v;
}

function toggleOverrideActive(scenario, key, checked){
  const farm = activeFarm(); if(!farm) return;
  const cfg = farm.scenarios[scenario];
  if(checked){
    if(!cfg.overrides[key]){
      const sensor = farm.sensors.find(s=>s.key===key);
      cfg.overrides[key] = {min:sensor.min, max:sensor.max};

  }

}

function quickSwitchScenario(name){

function addCustomScenario(){

function removeScenario(name){

  if(BASE_SCENARIOS.includes(name)){ alert('Built-in scenarios can be reconfigured but not removed.'); return; }

async function confirmCreateFarm(){
  const d = state.createDraft;
  const nameInput = document.getElementById('cfName');
  const fieldInput = document.getElementById('cfField');
  const cropInput = document.getElementById('cfCrop');
  const name = (nameInput ? nameInput.value : d.name).trim() || d.name;
  const field = (fieldInput ? fieldInput.value : d.field).trim() || d.field;
  const crop = (cropInput ? cropInput.value : d.crop).trim() || d.crop;

  // Every new farm starts with zero sensors. Sensors only ever appear on
  // a farm once they're explicitly mapped from the Sensors tab — this is
  // the deliberate, agreed behaviour, not a placeholder.
  const sensors = [];

  // The backend call is now REQUIRED, not best-effort. A farm that
  // exists only in this browser tab (no real Ditto thing behind it) is
  // exactly the bug that was reported: it shows up immediately, then
  // vanishes on refresh because /farms (the real source of truth) never
  // had it. So: no successful POST -> no farm shown, full stop. The
  // create button stays disabled and an error is shown instead of
  // silently faking success.
  const confirmBtn = document.getElementById('createFarmConfirmBtn');
  if(confirmBtn){ confirmBtn.disabled = true; confirmBtn.textContent = 'Creating…'; }

  let farmId = null;
  try{
    const res = await fetch('/farms', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, field, crop})
    });
    if(!res.ok){
      const detail = await res.text();
      alert(`Could not create this farm on the server — it was NOT created.\n\n${detail || ('HTTP ' + res.status)}`);
      if(confirmBtn){ confirmBtn.disabled = false; confirmBtn.textContent = 'Create Farm'; }
      return;
    }
    const data = await res.json();
    farmId = data.farm_id;
  }catch(e){
    console.error('confirmCreateFarm:', e);
    alert('Could not reach the backend to create this farm. It was NOT created — check your connection/server and try again.');
    if(confirmBtn){ confirmBtn.disabled = false; confirmBtn.textContent = 'Create Farm'; }
    return;
  }

  const farm = createFarm(name, false, {id: farmId, sensors, meta:{field, crop, plantingDate:new Date().toISOString().slice(0,10), daysSincePlanting:0, growthStage:'Seedling'}});
  state.farms.push(farm);
  state.activeFarmId = farm.id;
  try{ localStorage.setItem('smartfarm_active_farm', farm.id); }catch(e){ /* storage unavailable */ }
  state.activeTab = 'dashboard';
  startFarmTimers(farm);
  closeOverlay();
  renderAll();
}

const CROP_ICONS = {tomato:'🍅', wheat:'🌾', rice:'🌾', corn:'🌽', maize:'🌽', cotton:'☁️', potato:'🥔', onion:'🧅', chili:'🌶️', chilli:'🌶️', sugarcane:'🎋', soybean:'🫘', mango:'🥭', banana:'🍌'};
function cropIcon(crop){
  if(!crop) return '🌱';
  const k = crop.trim().toLowerCase();
  return CROP_ICONS[k] || '🌱';
}

function renderAll(){ renderSidebar(); renderContent(); renderOverlay(); }

function renderSidebar(){

  const list = document.getElementById('farmList');

    `;
  }).join('') || '<div class="empty-state" style="margin:8px 4px;">No farms yet. Click "+ Create Farm" below.</div>';

function rangeBar(sensor, override, farmId){
  const min = override ? override.min : sensor.min;
  const max = override ? override.max : sensor.max;
  const pct = clamp(((sensor.value-min)/((max-min)||1))*100, 0, 100);
  const cls = override ? 'overridden' : sensor.mode;
  return `
    <div class="rangebar ${cls}">
      <div class="rangebar-track">
        <div class="rangebar-fill" id="rangebarfill_${farmId}_${sensor.key}" style="width:${pct}%"></div>
        <div class="rangebar-marker" id="rangebarmarker_${farmId}_${sensor.key}" style="left:${pct}%"></div>
      </div>
      <div class="rangebar-labels"><span>${fmt(min,sensor.decimals)}</span><span>${fmt(max,sensor.decimals)} ${sensor.unit}</span></div>
    </div>
  `;
}

function sensorRow(sensor, farm){
  const override = activeOverrideFor(farm, sensor.key);
  const realOff = sensor.mode==='actual' && sensor.enabledReal===false;
  const stale = sensor.mode==='actual' && !realOff && farm.actualStale && !override;
  const isOn = sensor.mode==='actual' ? sensor.enabledReal!==false : false;
  const showEditor = (sensor.mode==='virtual' || realOff) && !override;
  return `
    <div class="sensor-row">
      <div class="sensor-row-top">
        <div>
          <div class="sensor-name">
            ${sensor.name}
            <span class="mode-badge ${sensor.mode}">${sensor.mode==='actual' ? 'Real' : 'Virtual'}</span>
            ${override ? `<span class="override-flag">${farm.activeScenario}</span>`:''}
          </div>
          <div class="sensor-meta">
            ${isOn ? `updated ${timeAgo(Date.now())}${stale?'<span class="stale-tag"> · using last known value</span>':''}`
              : realOff ? '<span class="off-tag">Real sensor — manually disabled, showing simulated value</span>'
              : '<span class="off-tag">Simulated — sensor turned off</span>'}
          </div>
        </div>
        <div class="sensor-row-controls">
          <div class="sensor-value" id="sensorval_${farm.id}_${sensor.key}"><span class="value-num">${fmt(sensor.value, sensor.decimals)}</span><span class="unit">${sensor.unit}</span></div>
          <div>
            <button class="source-toggle ${isOn?'on':''}" title="${isOn?'Turn off real sensor':'Turn on real sensor'}" onclick="toggleSensorSource('${farm.id}','${sensor.key}')">
              <div class="knob"></div>
            </button>
            <div class="source-toggle-label">${isOn?'ON':'OFF'}</div>
          </div>
        </div>
      </div>
      ${rangeBar(sensor, override, farm.id)}
      ${showEditor ? `
        <div class="minmax-editor">
          <label>Min</label>
          <input type="number" step="any" id="twinmin_${farm.id}_${sensor.key}" value="${sensor.min}">
          <label>Max</label>
          <input type="number" step="any" id="twinmax_${farm.id}_${sensor.key}" value="${sensor.max}">
          <button class="primary small" onclick="saveTwinSensorRange('${farm.id}','${sensor.key}')">Save</button>
          <span id="twinrangestatus_${farm.id}_${sensor.key}" style="color:var(--ink-soft);margin-left:4px;"></span>
        </div>
      ` : ''}
    </div>
  `;
}

function toggleSensorSource(farmId, sensorKey){
  const farm = state.farms.find(f=>f.id===farmId);
  if(!farm) return;
  const sensor = farm.sensors.find(s=>s.key===sensorKey);
  if(!sensor) return;

  if(sensor.mode === 'actual'){
    // Real, hardware-backed channel: this switch only controls whether
    // live device data is accepted for it. It must NEVER move the row
    // into the Virtual section — mode stays 'actual' permanently here,
    // because the sensor really is installed in the field either way.
    toggleRealSensorEnabled(farm, sensor);
    return;
  }

  // Pure virtual placeholder row — unrelated existing behaviour, unchanged.
  sensor.mode = sensor.mode==='actual' ? 'virtual' : 'actual';
  if(sensor.mode==='virtual'){
    sensor.value = randIn(sensor.min, sensor.max, sensor.decimals);
  }
  renderContent();
}

// Switches a real channel's enabledReal flag and persists it through the
// same /sensors/{rawKey}/enabled route the Sensors tab already uses (so a
// change made here is the same durable state, not a second, conflicting
// local-only flag). Updates optimistically so the switch responds
// instantly, then rolls back if the backend call fails.
async function toggleRealSensorEnabled(farm, sensor){
  const rawKey = sensor.deviceKey || sensor.key;
  const channel = sensor.key;
  const wasEnabled = sensor.enabledReal !== false;
  const nextEnabled = !wasEnabled;

  sensor.enabledReal = nextEnabled;
  if(!nextEnabled){
    sensor.value = randIn(sensor.min, sensor.max, sensor.decimals);
  }
  renderContent();

  try{
    const res = await fetch(`/sensors/${rawKey}/enabled`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({channel, enabled: nextEnabled})
    });
    if(!res.ok){
      sensor.enabledReal = wasEnabled; // roll back the optimistic flip
      renderContent();
      alert('Could not change sensor state — see console for details.');
      console.error(await res.text());
      return;
    }
    const cat = sensorState.sensors.find(x=>x.rawKey===rawKey);
    if(cat){ cat.enabled = cat.enabled || {}; cat.enabled[channel] = nextEnabled; }
  }catch(e){
    sensor.enabledReal = wasEnabled;
    renderContent();
    console.error('toggle real sensor enabled:', e);
    alert('Could not reach the backend to change this sensor.');
  }
}

function updateSensorRange(farmId, sensorKey, bound, value){
  const farm = state.farms.find(f=>f.id===farmId);
  if(!farm) return;
  const sensor = farm.sensors.find(s=>s.key===sensorKey);
  if(!sensor) return;
  const num = parseFloat(value);
  if(isNaN(num)) return;
  sensor[bound] = num;
  if(sensor.min >= sensor.max){
    // keep range valid — nudge max up slightly rather than silently rejecting
    sensor.max = sensor.min + (sensor.decimals>0 ? 0.1 : 1);
  }
  sensor.value = randIn(sensor.min, sensor.max, sensor.decimals);
  renderContent();
}

function renderContent(){
  const farm = activeFarm();
  const content = document.getElementById('content');

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===state.activeTab));
  document.querySelectorAll('.side-nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===state.activeTab));

  // Sensors tab doesn't require a farm — handle it first
  if(state.activeTab==='sensors'){
    document.getElementById('farmTitle').textContent = 'Sensor Registry';
    document.getElementById('farmSub').textContent = 'All sensors discovered from MQTT — rename and map to farms';
    content.innerHTML = renderSensors();
    return;
  }

  document.getElementById('farmTitle').innerHTML = farm ? `<span class="title-icon">${cropIcon(farm.crop)}</span>${farm.name}` : 'No farm selected';
  document.getElementById('farmSub').textContent = farm
    ? `${farm.field || ''}${farm.field && farm.crop ? ' · ' : ''}${farm.crop || ''}${farm.activeScenario ? ' · Scenario: '+farm.activeScenario : (farm.field||farm.crop ? ' · Normal conditions' : 'Normal conditions')}`
    : 'Create a farm to get started';

  if(!farm){
    content.innerHTML = `<div class="empty-state"><span class="big">No farm found</span>No farm thing exists yet. Click "+ Create Farm" in the left sidebar to create your first one.</div>`;
    return;
  }

  if(state.activeTab==='dashboard') content.innerHTML = renderDashboard(farm);
  else content.innerHTML = renderSettings(farm);
}

// ---- sensor registry state & helpers ----

let sensorState = {
  sensors: [],
  farms: [],   // [{farm_id, name}] for the map dropdown
  loading: false,
  expanded: new Set(),   // rawKeys whose mapping/range editor is open
};

async function loadSensors(){
  sensorState.loading = true;
  try{
    const [sRes, fRes] = await Promise.all([
      fetch('/sensors'),
      fetch('/farms')
    ]);
    if(sRes.ok) sensorState.sensors = (await sRes.json()).sensors || [];
    if(fRes.ok) sensorState.farms = (await fRes.json()).farms || [];
  }catch(e){ console.error('loadSensors:', e); }
  sensorState.loading = false;

  // THE FIX: every time the catalog is refreshed, re-derive each farm's
  // Twin-tab sensor list from whatever is currently mapped to it. Without
  // this, farm.sensors stays permanently empty (by design, per the "no
  // sensor until mapped" fix) and tickActual's forEach loop has nothing
  // to write live values into — the backend sync was always correct,
  // the Twin tab just never asked the catalog what it should be showing.
  rebuildAllFarmSensorsFromCatalog();

  if(state.activeTab==='sensors' && !isEditingFocusedInContent()) renderContent();
}

// Derive ONE farm's Twin-tab sensor rows from the catalog's mappings.
// A real sensor contributes one row PER VISIBLE CHANNEL (its full channel
// list, narrowed by that specific mapping's channel subset if it has one,
// then with any catalog-level disabled channels removed — disabled means
// the backend sync loop won't deliver that channel to ANY farm, so it
// shouldn't appear here either). A virtual sensor contributes one row.
// Existing values are carried over by key so a rebuild never causes a
// visible flash/reset of whatever was already on screen.
function rebuildFarmSensorsFromCatalog(farm){
  if(!farm) return;
  const oldByKey = new Map(farm.sensors.map(s=>[s.key, s]));
  const next = [];

  sensorState.sensors.forEach(cat=>{
    const mapping = (cat.mappings || []).find(m => m.farmId === farm.id);
    if(!mapping) return; // not mapped to this farm — show nothing for it

    if(cat.source === 'real'){
      const allChannels = cat.channels || [];
      const visible = (mapping.channels && mapping.channels.length) ? mapping.channels : allChannels;
      const enabledMap = cat.enabled || {};
      const minMap = cat.min || {};
      const maxMap = cat.max || {};

      visible.forEach(ch=>{
        const min = (minMap[ch] !== undefined && minMap[ch] !== null) ? minMap[ch] : 0;
        const max = (maxMap[ch] !== undefined && maxMap[ch] !== null) ? maxMap[ch] : 100;
        const existing = oldByKey.get(ch);
        next.push({
          key: ch,
          name: ch,
          unit: '',
          mode: 'actual',
          // enabledReal: true = live hardware data is accepted for this channel.
          // false = administratively switched off — this row STAYS in the
          // real/actual section (mode never changes) but its value is now
          // generated within min/max instead of coming from the device.
          // Always read fresh from the catalog (the real source of truth) so
          // a change made anywhere — this Twin tab, the Sensors tab, another
          // browser tab — is reflected consistently everywhere.
          enabledReal: enabledMap[ch] !== false,
          min, max,
          decimals: (max - min) < 5 ? 2 : 1,
          value: existing ? existing.value : round((min + max) / 2, 1),
          deviceKey: cat.rawKey,
        });
      });
    } else {
      const minMap = cat.min || {};
      const maxMap = cat.max || {};
      const min = (minMap[cat.rawKey] !== undefined && minMap[cat.rawKey] !== null) ? minMap[cat.rawKey] : 0;
      const max = (maxMap[cat.rawKey] !== undefined && maxMap[cat.rawKey] !== null) ? maxMap[cat.rawKey] : 100;
      const existing = oldByKey.get(cat.rawKey);
      next.push({
        key: cat.rawKey,
        name: cat.name || cat.rawKey,
        unit: '',
        mode: 'virtual',
        min, max,
        decimals: (max - min) < 5 ? 2 : 1,
        value: existing ? existing.value : round((min + max) / 2, 1),
      });
    }
  });

  farm.sensors = next;
}

function rebuildAllFarmSensorsFromCatalog(){
  state.farms.forEach(rebuildFarmSensorsFromCatalog);
  if(state.activeTab==='dashboard' && !isEditingFocusedInContent()) renderContent();
}

function farmName(farmId){
  const f = sensorState.farms.find(x=>x.farm_id===farmId);
  return f ? f.name : farmId;
}

function toggleSensorExpanded(rawKey){
  if(sensorState.expanded.has(rawKey)) sensorState.expanded.delete(rawKey);
  else sensorState.expanded.add(rawKey);
  renderContent();
}

function renderSensors(){
  const newSensors = sensorState.sensors.filter(s=>s.isNew);
  const knownSensors = sensorState.sensors.filter(s=>!s.isNew);
  const totalThings = sensorState.farms.length;
  const totalSensors = sensorState.sensors.length;

  function mappingChip(s, mapping){
    const label = mapping.channels && mapping.channels.length
      ? `${farmName(mapping.farmId)} — ${mapping.channels.join(', ')}`
      : `${farmName(mapping.farmId)} — all channels`;
    return `
      <span class="mapping-chip">
        ${label}
        <button class="mapping-chip-remove" title="Remove this mapping" onclick="doRemoveMapping('${s.rawKey}','${mapping.farmId}')">✕</button>
      </span>
    `;
  }

  function addMappingRow(s){
    const farmOptions = sensorState.farms
      .filter(f => !(s.mappings||[]).some(m=>m.farmId===f.farm_id))
      .map(f=>`<option value="${f.farm_id}">${f.name}</option>`).join('');
    if(!farmOptions) return `<div class="helper-text" style="margin-top:6px;">Already mapped to every farm.</div>`;

    const channelBoxes = (s.channels||[]).map(ch=>`
      <label class="channel-pick"><input type="checkbox" value="${ch}" data-addchan-${s.rawKey}> ${ch}</label>
    `).join('') || '<span style="color:var(--ink-soft);font-size:12px;">No channels reported yet</span>';

    return `
      <div class="add-mapping-row" id="addmap_${s.rawKey}">
        <select id="addmapfarm_${s.rawKey}">
          <option value="">— choose a farm to add —</option>
          ${farmOptions}
        </select>
        ${s.channels && s.channels.length ? `
          <div class="channel-pick-group">
            <span style="font-size:11px;color:var(--ink-soft);">Channels for this farm (leave all unchecked = every channel):</span>
            <div class="channel-pick-list">${channelBoxes}</div>
          </div>
        ` : ''}
        <button class="primary small" onclick="doAddMapping('${s.rawKey}')">+ Add farm mapping</button>
      </div>
    `;
  }

  function channelRangeEditor(s){
    if(!s.channels || !s.channels.length){
      return `<div class="helper-text">No channels reported yet — this sensor hasn't published any readings.</div>`;
    }
    const mins = s.min || {};
    const maxs = s.max || {};
    const enabled = s.enabled || {};
    return `
      <div class="channel-range-table">
        <div class="channel-range-row head">
          <div>Channel</div><div>Min</div><div>Max</div><div>On</div><div></div>
        </div>
        ${s.channels.map(ch=>{
          const isOn = enabled[ch] !== false;
          return `
          <div class="channel-range-row" id="chanrow_${s.rawKey}_${ch}">
            <div class="mono">${ch}</div>
            <div><input type="number" step="any" id="chanmin_${s.rawKey}_${ch}" value="${mins[ch] ?? ''}" placeholder="min"></div>
            <div><input type="number" step="any" id="chanmax_${s.rawKey}_${ch}" value="${maxs[ch] ?? ''}" placeholder="max"></div>
            <div>
              <button class="source-toggle small ${isOn?'on':''}" title="${isOn?'Turn channel off':'Turn channel on'}" onclick="doToggleChannelEnabled('${s.rawKey}','${ch}',${!isOn})">
                <div class="knob"></div>
              </button>
            </div>
            <div><button class="primary small" onclick="doSaveChannelRange('${s.rawKey}','${ch}')">Save</button></div>
          </div>
        `;}).join('')}
      </div>
    `;
  }

  function sensorRow(s){
    const isExpanded = sensorState.expanded.has(s.rawKey);
    const idLabel = s.source === 'real' ? (s.deviceId || s.rawKey) : s.rawKey;
    const mappings = s.mappings || [];
    return `
    <tr class="${s.isNew ? 'is-new' : ''}">
      <td>
        <span class="sensor-id">${idLabel}</span>
        ${s.isNew ? '<span class="new-pill">NEW</span>' : ''}
      </td>
      <td class="mono" style="color:var(--ink-soft);font-size:12px;">${s.rawKey || '—'}</td>
      <td>
        <div class="inline-rename">
          <input id="sname_${s.rawKey}" value="${s.name || ''}" placeholder="Sensor name">
          <button class="save-name-btn" onclick="doRenameSensor('${s.rawKey}')">Save</button>
        </div>
      </td>
      <td>
        <div class="mapping-chip-list">
          ${mappings.length ? mappings.map(m=>mappingChip(s,m)).join('') : '<span style="color:var(--ink-soft);font-size:12px;">— unmapped —</span>'}
        </div>
      </td>
      <td>${s.firstSeen ? s.firstSeen.slice(0,19).replace('T',' ') : '—'}</td>
      <td>
        <button class="ghost small" onclick="toggleSensorExpanded('${s.rawKey}')">${isExpanded?'Hide':'Configure'}</button>
        ${s.isNew
          ? `<button class="ack-btn" onclick="doAckSensor('${s.rawKey}')">Mark seen</button>`
          : ''}
      </td>
    </tr>
    ${isExpanded ? `
    <tr class="sensor-detail-row">
      <td colspan="6">
        <div class="sensor-detail-panel">
          <div class="sensor-detail-block">
            <div class="sensor-detail-label">Farm mappings — map this sensor (or just some of its channels) to one or more farms</div>
            ${addMappingRow(s)}
          </div>
          <div class="sensor-detail-block">
            <div class="sensor-detail-label">Per-channel range &amp; on/off — saved to the sensor catalog, applies for every farm and survives refresh</div>
            ${channelRangeEditor(s)}
          </div>
        </div>
      </td>
    </tr>
    ` : ''}`;
  }

  const tableHead = `
    <table class="sensor-table">
      <thead><tr>
        <th>ID</th><th>Raw Key</th><th>Name</th><th>Mapped Farms</th><th>First Seen</th><th></th>
      </tr></thead>
      <tbody>`;
  const tableClose = `</tbody></table>`;

  let html = `<div class="sensor-page">
    <h2>Sensor Registry</h2>
    <p class="sp-sub">
      Things on Ditto: <b>${totalThings}</b> &nbsp;·&nbsp;
      Sensors discovered: <b>${totalSensors}</b>
      ${newSensors.length > 0 ? `&nbsp;·&nbsp; <span style="color:var(--amber);font-weight:600;">⬤ ${newSensors.length} new</span>` : ''}
    </p>`;

  if(sensorState.loading){
    html += `<div style="color:var(--ink-soft);padding:20px;">Loading sensors…</div>`;
  } else if(sensorState.sensors.length === 0){
    html += `<div style="color:var(--ink-soft);padding:20px;">No sensors discovered yet. Start your MQTT pipeline — sensors appear here automatically as Ditto picks them up.</div>`;
  } else {
    if(newSensors.length > 0){
      html += `<div class="sensor-section">
        <div class="sensor-section-label">🟡 Newly Discovered (${newSensors.length})</div>
        ${tableHead}${newSensors.map(sensorRow).join('')}${tableClose}
      </div>`;
    }
    if(knownSensors.length > 0){
      html += `<div class="sensor-section">
        <div class="sensor-section-label">Known Sensors (${knownSensors.length})</div>
        ${tableHead}${knownSensors.map(sensorRow).join('')}${tableClose}
      </div>`;
    }
  }

  html += `</div>`;
  return html;
}

async function doRenameSensor(rawKey){
  const input = document.getElementById(`sname_${rawKey}`);
  if(!input) return;
  const newName = input.value.trim();
  if(!newName) return;
  try{
    const res = await fetch(`/sensors/${rawKey}/rename`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name: newName})
    });
    if(res.ok){
      const s = sensorState.sensors.find(x=>x.rawKey===rawKey);
      if(s) s.name = newName;
      input.style.borderColor = 'var(--ok)';
      setTimeout(()=>{ input.style.borderColor = ''; }, 1500);
    }
  }catch(e){ console.error('rename sensor:', e); }
}

async function doAddMapping(rawKey){
  const farmSel = document.getElementById(`addmapfarm_${rawKey}`);
  if(!farmSel || !farmSel.value){ alert('Choose a farm first.'); return; }
  const farmId = farmSel.value;

  const checked = Array.from(document.querySelectorAll(`[data-addchan-${rawKey}]:checked`)).map(el=>el.value);
  const channels = checked.length ? checked : null;   // none checked = every channel

  try{
    const res = await fetch(`/sensors/${rawKey}/mappings`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({farm_id: farmId, channels})
    });
    if(!res.ok){ alert('Could not add mapping — see console for details.'); console.error(await res.text()); return; }
    const data = await res.json();
    const s = sensorState.sensors.find(x=>x.rawKey===rawKey);
    if(s) s.mappings = data.mappings;
    rebuildAllFarmSensorsFromCatalog();
    const mappedFarm = state.farms.find(f=>f.id===farmId);
    if(mappedFarm) tickActual(mappedFarm);
    renderContent();
  }catch(e){ console.error('add mapping:', e); alert('Could not reach the backend to add this mapping.'); }
}

async function doRemoveMapping(rawKey, farmId){
  if(!confirm(`Remove the mapping to "${farmName(farmId)}" for this sensor?`)) return;
  try{
    const res = await fetch(`/sensors/${rawKey}/mappings/${farmId}`, {method: 'DELETE'});
    if(!res.ok){ alert('Could not remove mapping — see console for details.'); console.error(await res.text()); return; }
    const data = await res.json();
    const s = sensorState.sensors.find(x=>x.rawKey===rawKey);
    if(s) s.mappings = data.mappings;
    rebuildAllFarmSensorsFromCatalog();
    renderContent();
  }catch(e){ console.error('remove mapping:', e); alert('Could not reach the backend to remove this mapping.'); }
}

async function doSaveChannelRange(rawKey, channel){
  const minEl = document.getElementById(`chanmin_${rawKey}_${channel}`);
  const maxEl = document.getElementById(`chanmax_${rawKey}_${channel}`);
  const min = minEl && minEl.value !== '' ? parseFloat(minEl.value) : null;
  const max = maxEl && maxEl.value !== '' ? parseFloat(maxEl.value) : null;
  if((minEl.value !== '' && isNaN(min)) || (maxEl.value !== '' && isNaN(max))){
    alert('Min/max must be numbers.'); return;
  }
  if(min !== null && max !== null && min >= max){
    alert('Min must be less than max.'); return;
  }
  try{
    const res = await fetch(`/sensors/${rawKey}/range`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({channel, min, max})
    });
    if(!res.ok){ alert('Could not save range — see console for details.'); console.error(await res.text()); return; }
    const s = sensorState.sensors.find(x=>x.rawKey===rawKey);
    if(s){
      s.min = s.min || {}; s.max = s.max || {};
      if(min !== null) s.min[channel] = min;
      if(max !== null) s.max[channel] = max;
    }
    rebuildAllFarmSensorsFromCatalog();
    const row = document.getElementById(`chanrow_${rawKey}_${channel}`);
    if(row){
      row.style.outline = '2px solid var(--ok)';
      setTimeout(()=>{ if(row) row.style.outline = ''; }, 1200);
    }
  }catch(e){ console.error('save channel range:', e); alert('Could not reach the backend to save this range.'); }
}

// Shared by the Twin tab's virtual-sensor editor and the Settings tab's
// per-farm sensor table. Both used to be local-only (onchange, no backend
// call at all) which is exactly why min/max kept "reverting" — there was
// nothing to revert FROM, the typed value never left the browser, so the
// very next catalog poll (or any full re-render) simply redrew the old
// catalog/default value over whatever was typed. This persists through
// the same /sensors/{rawKey}/range endpoint the working Sensors-tab
// editor already uses, so a save here is durable and visible everywhere.
async function saveSensorRangeFor(farmId, sensorKey, minElId, maxElId, statusElId){
  const farm = state.farms.find(f=>f.id===farmId); if(!farm) return;
  const sensor = farm.sensors.find(s=>s.key===sensorKey); if(!sensor) return;

  const minEl = document.getElementById(minElId);
  const maxEl = document.getElementById(maxElId);
  if(!minEl || !maxEl) return;
  const min = minEl.value !== '' ? parseFloat(minEl.value) : null;
  const max = maxEl.value !== '' ? parseFloat(maxEl.value) : null;

  if((minEl.value !== '' && isNaN(min)) || (maxEl.value !== '' && isNaN(max))){
    alert('Min/max must be numbers.'); return;
  }
  if(min !== null && max !== null && min >= max){
    alert('Min must be less than max.'); return;
  }

  // A real sensor's row is keyed by its CHANNEL name (e.g. "moisture"), but
  // the backend route needs the underlying DEVICE key — rebuildFarmSensorsFromCatalog
  // attaches that as deviceKey on every real-sensor row for exactly this purpose.
  // A virtual sensor's row key already IS its catalog rawKey, so it doubles as both.
  const rawKey = sensor.deviceKey || sensor.key;
  const channel = sensor.key;

  const statusEl = statusElId ? document.getElementById(statusElId) : null;
  if(statusEl) statusEl.textContent = 'Saving…';

  try{
    const res = await fetch(`/sensors/${rawKey}/range`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({channel, min, max})
    });
    if(!res.ok){
      if(statusEl) statusEl.textContent = '';
      alert('Could not save range — see console for details.'); console.error(await res.text()); return;
    }
    const cat = sensorState.sensors.find(x=>x.rawKey===rawKey);
    if(cat){
      cat.min = cat.min || {}; cat.max = cat.max || {};
      if(min !== null) cat.min[channel] = min;
      if(max !== null) cat.max[channel] = max;
    }
    if(min !== null) sensor.min = min;
    if(max !== null) sensor.max = max;
    rebuildAllFarmSensorsFromCatalog();
    if(statusEl){
      statusEl.textContent = 'Saved ✓';
      setTimeout(()=>{ if(statusEl) statusEl.textContent = ''; }, 2000);
    }
  }catch(e){
    console.error('save sensor range:', e);
    if(statusEl) statusEl.textContent = '';
    alert('Could not reach the backend to save this range.');
  }
}

function saveTwinSensorRange(farmId, sensorKey){
  saveSensorRangeFor(
    farmId, sensorKey,
    `twinmin_${farmId}_${sensorKey}`, `twinmax_${farmId}_${sensorKey}`,
    `twinrangestatus_${farmId}_${sensorKey}`
  );
}

function saveSettingsSensorRange(farmId, sensorKey){
  saveSensorRangeFor(
    farmId, sensorKey,
    `setmin_${farmId}_${sensorKey}`, `setmax_${farmId}_${sensorKey}`,
    `setrangestatus_${farmId}_${sensorKey}`
  );
}

async function doToggleChannelEnabled(rawKey, channel, enabled){
  try{
    const res = await fetch(`/sensors/${rawKey}/enabled`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({channel, enabled})
    });
    if(!res.ok){ alert('Could not change channel state — see console for details.'); console.error(await res.text()); return; }
    const s = sensorState.sensors.find(x=>x.rawKey===rawKey);
    if(s){ s.enabled = s.enabled || {}; s.enabled[channel] = enabled; }
    rebuildAllFarmSensorsFromCatalog();
    renderContent();
  }catch(e){ console.error('toggle channel enabled:', e); alert('Could not reach the backend to change this channel.'); }
}

async function doAckSensor(rawKey){
  try{
    await fetch(`/sensors/${rawKey}/acknowledge`, {method:'POST'});
    const s = sensorState.sensors.find(x=>x.rawKey===rawKey);
    if(s) s.isNew = false;
    if(state.activeTab==='sensors') renderContent();
  }catch(e){ console.error('ack sensor:', e); }
}

function renderScenarioBar(farm){
  const allNames = [...BASE_SCENARIOS, ...Object.keys(farm.scenarios).filter(n=>!BASE_SCENARIOS.includes(n))];
  const pills = allNames.map(name=>{
    const color = scenarioColor(name, farm);
    const isActive = farm.activeScenario===name;
    return `<button class="scenario-pill-btn ${isActive?'active':''}" style="${isActive?'':`border-color:${color}55`}" onclick="quickSwitchScenario('${name}')">
      <span class="pill-icon">${scenarioIcon(name)}</span>${name}
    </button>`;
  }).join('');
  return `
    <div class="scenario-bar">
      <button class="scenario-pill-btn ${!farm.activeScenario?'active':''}" onclick="quickSwitchScenario(null)"><span class="pill-icon">🌤️</span>Normal</button>
      ${pills}
      <button class="scenario-pill-btn add-custom" onclick="addCustomScenario()">+ Custom scenario</button>
    </div>
  `;
}

function renderDashboard(farm){
  let banner = '';
  if(farm.activeScenario){
    const overridden = Object.keys(farm.scenarios[farm.activeScenario].overrides).length;
    banner = `<div class="banner amber"><span class="banner-dot"></span>${farm.activeScenario} scenario is live — ${overridden} sensor(s) showing injected values for this farm.
      <button class="ghost" style="margin-left:auto" onclick="deactivateScenario()">Back to normal</button></div>`;
  } else if(farm.actualStale){
    banner = `<div class="banner stale"><span class="banner-dot"></span>Live sensor feed unreachable — showing last known readings.</div>`;
  }

  const allActual = farm.sensors.filter(s=>s.mode==='actual');
  const allVirtual = farm.sensors.filter(s=>s.mode==='virtual');

  let actualSensors = allActual;
  let virtualSensors = allVirtual;

    : `<div class="img-upload-box" onclick="triggerImageUpload()"><span class="plus">+</span></div>

  return `
    ${renderScenarioBar(farm)}
    ${banner}

    <div class="twin-section">

        <span class="dot actual"></span><span class="twin-section-title">📟 Actual Data</span>

          </div>

          <div class="panel-head"><span class="panel-title">🌱 Soil Probe Readings</span><span class="panel-count" style="margin-left:auto;font-size:11px;color:var(--ink-soft);">live</span></div>
          <div class="panel-body">
            ${actualSensors.map(s=>sensorRow(s,farm)).join('') || (farm.activeScenario ? `<div class="empty-state">No actual sensors are included in the <b>${farm.activeScenario}</b> scenario.</div>` : '<div class="empty-state">No actual sensors configured for this farm.</div>')}
          </div>

      <div class="twin-section-head">

      </div>
      <div class="panel">
        <div class="panel-head"><span class="panel-title">🌤️ Simulated Weather, Plant &amp; Soil-Chemistry</span></div>
        <div class="panel-body">
          <div class="sensor-grid">
            ${virtualSensors.map(s=>sensorRow(s,farm)).join('') || (farm.activeScenario ? `<div class="empty-state">No virtual sensors are included in the <b>${farm.activeScenario}</b> scenario.</div>` : '<div class="empty-state">No virtual sensors configured for this farm.</div>')}
          </div>
        </div>
      </div>
